version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: hades-star-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: hades
      POSTGRES_PASSWORD: hades_secret
      POSTGRES_DB: hades_star_market
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
